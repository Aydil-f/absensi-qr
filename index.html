<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi QR - SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Perubahan palet warna ke Deep Dark Blue */
            --bg-deep: #020817; /* Navy super gelap */
            --bg-surface: #0f172a; /* Navy untuk kartu */
            --primary-neon: #3b82f6; 
            --secondary-neon: #38bdf8;
            --glass: rgba(15, 23, 42, 0.9); /* Lebih pekat agar mewah */
            --border-glow: rgba(59, 130, 246, 0.2);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-deep);
            /* Gradien biru tua yang lebih elegan */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(15, 23, 42, 0.5) 0%, transparent 50%);
            margin: 0; min-height: 100vh; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Dekorasi partikel yang lebih subtle */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.03; z-index: -1;
        }

        .header { 
            padding: 45px 20px 30px; 
            text-align: center; 
        }

        .header h1 { 
            font-size: 1.4rem;
            font-weight: 800; 
            margin: 0;
            letter-spacing: 1.5px;
            /* Gradien teks putih ke perak */
            background: linear-gradient(to bottom, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .header p { 
            color: var(--secondary-neon); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.65rem; 
            font-weight: 700; 
            margin-top: 10px;
            opacity: 0.9;
        }

        .container { width: 92%; max-width: 400px; }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 26px;
            /* Shadow yang lebih dalam */
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .mode-selector {
            display: flex; background: rgba(2, 6, 23, 0.6); border-radius: 16px;
            padding: 5px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.03);
        }

        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: transparent; color: #94a3b8; font-weight: 700; font-size: 11px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-btn.active-m { background: #1d4ed8; color: white; box-shadow: 0 4px 15px rgba(29, 78, 216, 0.4); }
        .mode-btn.active-p { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.05); }

        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(59, 130, 246, 0.1) !important;
            background: black;
        }

        .status-box {
            display: none; margin-top: 25px; padding: 18px; border-radius: 20px;
            background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .log-section { margin-top: 40px; width: 100%; padding-bottom: 50px; }
        .log-title { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .log-item {
            background: rgba(15, 23, 42, 0.4); padding: 14px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
            transition: 0.3s;
        }
        .log-item:hover { background: rgba(15, 23, 42, 0.6); border-color: rgba(59, 130, 246, 0.2); }

        #reader__dashboard_section_csr button {
            background: #2563eb !important; border: none !important; border-radius: 12px !important;
            padding: 10px 20px !important; color: white !important; font-size: 12px !important;
            font-weight: 700 !important;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>SDN KAMPUNG BESAR III</h1>
    <p>Silahkan Scan Kartu QR Anda</p>
</div>

<div class="container">
    <div class="main-card">
        <div class="mode-selector">
            <button id="mBtn" class="mode-btn" onclick="setMode('MASUK')">MASUK</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('PULANG')">PULANG</button>
        </div>

        <div id="reader"></div>

        <div id="statusBox" class="status-box">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 32px; height: 32px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);">✓</div>
                <div>
                    <h4 style="margin: 0; color: #34d399; font-size: 13px;">Berhasil</h4>
                    <p id="statusMsg" style="margin: 2px 0 0; color: #94a3b8; font-size: 10px;">Data Terverifikasi</p>
                </div>
            </div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-title">History Absen</div>
        <div id="logList"></div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbypNOLWfeCeYlLeKh8a2wbi9Q0G7-vSxcJXO3RP5eTzBBsGr0bXuC380Vnj_oE0bjQ/exec"; 
    let currentMode = "";
    let isProcessing = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mBtn').className = 'mode-btn';
        document.getElementById('pBtn').className = 'mode-btn';
        if(mode === 'MASUK') document.getElementById('mBtn').classList.add('active-m');
        else document.getElementById('pBtn').classList.add('active-p');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing || !currentMode) return;
        isProcessing = true;
        
        const box = document.getElementById('statusBox');
        const msg = document.getElementById('statusMsg');
        box.style.display = "block";
        msg.innerText = "Mengirim data...";

        navigator.geolocation.getCurrentPosition((pos) => {
            fetch(`${webAppUrl}?id_user=${encodeURIComponent(decodedText)}&tipe=${currentMode}&lat=${pos.coords.latitude}&long=${pos.coords.longitude}`)
            .then(() => {
                msg.innerText = `Terverifikasi: ${decodedText}`;
                updateLog(decodedText, currentMode);
                setTimeout(() => { box.style.display = "none"; isProcessing = false; }, 3000);
            });
        }, () => {
            alert("Aktifkan GPS!");
            isProcessing = false;
        });
    }

    function updateLog(id, mode) {
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const item = `
            <div class="log-item">
                <div>
                    <div style="font-weight:700; font-size:12px; color: #f1f5f9;">${id}</div>
                    <div style="font-size:9px; color:#64748b; margin-top: 2px;">${now}</div>
                </div>
                <div style="font-weight:800; font-size:11px; color: ${mode === 'MASUK' ? '#34d399' : '#f87171'}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = item + document.getElementById('logList').innerHTML;
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);
</script>
</body>
</html>
