<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #008080; --masuk: #2ecc71; --pulang: #e74c3c; --bg: #f8f9fa; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, var(--primary), #005a5a); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }

        .container { padding: 20px; flex: 1; max-width: 500px; margin: -40px auto 0 auto; width: 100%; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        
        .mode-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .mode-btn { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); color: #fff; background: #bdc3c7; text-transform: uppercase; }
        
        .btn-masuk.active { background: var(--masuk); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(46, 204, 113, 0.3); }
        .btn-pulang.active { background: var(--pulang); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(231, 76, 60, 0.3); }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; }
        #reader__dashboard_section_csr button { background: var(--primary); color: white; border-radius: 8px; padding: 10px; border: none; margin-top: 10px; }

        .status-pill { display: none; padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: 600; font-size: 14px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .history-label { font-weight: 700; color: #7f8c8d; margin-bottom: 10px; display: block; font-size: 12px; text-transform: uppercase; }
        .log-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h2>ABSENSI QR SDN KAMBES 3</h2>
</div>

<div class="container">
    <div class="card">
        <span class="history-label text-center">Pilih Status Presensi</span>
        <div class="mode-selector">
            <button id="btnM" class="mode-btn btn-masuk" onclick="setMode('MASUK')">MASUK</button>
            <button id="btnP" class="mode-btn btn-pulang" onclick="setMode('PULANG')">PULANG</button>
        </div>
        
        <div id="reader"></div>
        <div id="status" class="status-pill"></div>
    </div>

    <span class="history-label">Riwayat Terakhir</span>
    <div id="logList"></div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbz0n0DAbO0QywXKT7i9ZYfshVLz9nm086LqHSaM0ZlhZrTBZd1MNimSGCGVGkJctUiY/exec"; // GANTI DENGAN URL EXEC ANDA
    let currentMode = "";
    let isLocked = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnM').classList.remove('active');
        document.getElementById('btnP').classList.remove('active');
        
        if(mode === 'MASUK') document.getElementById('btnM').classList.add('active');
        else document.getElementById('btnP').classList.add('active');
    }

    function onScanSuccess(decodedText) {
        if (isLocked) return;
        if (!currentMode) {
            alert("Harap pilih mode MASUK atau PULANG!");
            return;
        }

        isLocked = true;
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.style.background = "#ebf5fb";
        statusDiv.style.color = "#2980b9";
        statusDiv.innerHTML = "⌛ Mengirim Data...";

        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ id_user: decodedText, tipe: currentMode })
        })
        .then(() => {
            statusDiv.style.background = currentMode === 'MASUK' ? "#d4edda" : "#f8d7da";
            statusDiv.style.color = currentMode === 'MASUK' ? "#155724" : "#721c24";
            statusDiv.innerHTML = `✅ Berhasil ${currentMode}: ${decodedText}`;
            
            addLog(decodedText, currentMode);
            
            setTimeout(() => { 
                statusDiv.style.display = "none";
                isLocked = false; 
            }, 3000);
        })
        .catch(() => {
            statusDiv.style.background = "#f2dede";
            statusDiv.innerText = "❌ Gagal Terhubung Server";
            isLocked = false;
        });
    }

    function addLog(id, mode) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const logHtml = `
            <div class="log-item" style="border-left-color: ${mode === 'MASUK' ? '#2ecc71' : '#e74c3c'}">
                <div>
                    <div style="font-weight:700">${id}</div>
                    <div style="font-size:11px; color:#95a5a6">${time}</div>
                </div>
                <div style="font-weight:700; color:${mode === 'MASUK' ? '#2ecc71' : '#e74c3c'}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = logHtml + document.getElementById('logList').innerHTML;
    }

    // Auto Start Scanner
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 15, 
        qrbox: {width: 250, height: 250},
        rememberLastUsedCamera: true
    });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
