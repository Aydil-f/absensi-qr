<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Masuk/Pulang</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #008080; --secondary: #6c757d; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        .header { background: var(--primary); color: white; padding: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-masuk { background: #28a745; color: white; opacity: 0.5; }
        .btn-pulang { background: #dc3545; color: white; opacity: 0.5; }
        .active { opacity: 1; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid black; }
        #reader { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        #status { padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h3>PRESENSI DIGITAL SDN KAMBES 3</h3></div>

<div class="container">
    <p>Pilih Tipe Absen Dahulu:</p>
    <div class="btn-group">
        <button id="btnMasuk" class="btn-masuk" onclick="setTipe('MASUK')">MASUK</button>
        <button id="btnPulang" class="btn-pulang" onclick="setTipe('PULANG')">PULANG</button>
    </div>

    <div id="reader"></div>
    <div id="status"></div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxwph2sr73lF7xHciGgR-_PxKNYx1LoTedpBkQ5THZkG0Ciy5lWg9auUuytlOrNKWCy/exec";
    let tipeAbsen = ""; 
    let isProcessing = false;

    function setTipe(tipe) {
        tipeAbsen = tipe;
        document.getElementById('btnMasuk').classList.remove('active');
        document.getElementById('btnPulang').classList.remove('active');
        
        if(tipe === 'MASUK') document.getElementById('btnMasuk').classList.add('active');
        if(tipe === 'PULANG') document.getElementById('btnPulang').classList.add('active');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        if (tipeAbsen === "") {
            alert("PILIH TIPE ABSEN (MASUK/PULANG) DAHULU!");
            return;
        }

        isProcessing = true;
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.style.background = "#eee";
        statusDiv.innerText = `Memproses ${tipeAbsen}...`;

        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                id_user: decodedText,
                tipe: tipeAbsen,
                id_device: navigator.userAgent
            })
        })
        .then(() => {
            statusDiv.style.background = tipeAbsen === 'MASUK' ? "#d4edda" : "#f8d7da";
            statusDiv.innerText = `BERHASIL ${tipeAbsen}: ${decodedText}`;
            setTimeout(() => { 
                statusDiv.style.display = "none";
                isProcessing = false; 
            }, 3000);
        })
        .catch(err => {
            alert("Error: " + err);
            isProcessing = false;
        });
    }

    var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
