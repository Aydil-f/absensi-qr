<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi QR - SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --primary-neon: #3b82f6;
            --secondary-neon: #06b6d4;
            --glass: rgba(15, 23, 42, 0.8);
            --border-glow: rgba(59, 130, 246, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            margin: 0; min-height: 100vh; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Dekorasi Garis Partikel Halus */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05; z-index: -1;
        }

        .header { 
            padding: 40px 20px 25px; 
            text-align: center; 
        }

        .header h1 { 
            font-size: 1.4rem; /* Ukuran teks SDN lebih kecil sesuai permintaan */
            font-weight: 700; 
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .header p { 
            color: var(--secondary-neon); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-size: 0.65rem; 
            font-weight: 600; 
            margin-top: 8px;
            opacity: 0.8;
        }

        .container { width: 92%; max-width: 400px; }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .mode-selector {
            display: flex; background: rgba(0,0,0,0.4); border-radius: 14px;
            padding: 4px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .mode-btn {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            background: transparent; color: #64748b; font-weight: 700; font-size: 11px;
            cursor: pointer; transition: 0.3s;
        }

        .mode-btn.active-m { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .mode-btn.active-p { background: #1e293b; color: white; }

        #reader { 
            width: 100%; border-radius: 16px; overflow: hidden; 
            border: 1px solid rgba(59, 130, 246, 0.15) !important;
        }

        .status-box {
            display: none; margin-top: 20px; padding: 15px; border-radius: 16px;
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .log-section { margin-top: 30px; width: 100%; padding-bottom: 40px; }
        .log-title { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .log-item {
            background: rgba(255,255,255,0.02); padding: 12px 18px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }

        /* Penyesuaian tombol bawaan scanner */
        #reader__dashboard_section_csr button {
            background: #2563eb !important; border: none !important; border-radius: 8px !important;
            padding: 8px 16px !important; color: white !important; font-size: 12px !important;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>SDN KAMPUNG BESAR III</h1>
    <p>Silahkan Scan Kartu QR Anda</p>
</div>

<div class="container">
    <div class="main-card">
        <div class="mode-selector">
            <button id="mBtn" class="mode-btn" onclick="setMode('MASUK')">MASUK</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('PULANG')">PULANG</button>
        </div>

        <div id="reader"></div>

        <div id="statusBox" class="status-box">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 30px; height: 30px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;">✓</div>
                <div>
                    <h4 style="margin: 0; color: #34d399; font-size: 12px;">Berhasil</h4>
                    <p id="statusMsg" style="margin: 2px 0 0; color: #94a3b8; font-size: 10px;">Data Terverifikasi</p>
                </div>
            </div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-title">History Absen</div>
        <div id="logList"></div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbypNOLWfeCeYlLeKh8a2wbi9Q0G7-vSxcJXO3RP5eTzBBsGr0bXuC380Vnj_oE0bjQ/exec"; 
    let currentMode = "";
    let isProcessing = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mBtn').className = 'mode-btn';
        document.getElementById('pBtn').className = 'mode-btn';
        if(mode === 'MASUK') document.getElementById('mBtn').classList.add('active-m');
        else document.getElementById('pBtn').classList.add('active-p');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing || !currentMode) return;
        isProcessing = true;
        
        const box = document.getElementById('statusBox');
        const msg = document.getElementById('statusMsg');
        box.style.display = "block";
        msg.innerText = "Mengirim data...";

        navigator.geolocation.getCurrentPosition((pos) => {
            fetch(`${webAppUrl}?id_user=${encodeURIComponent(decodedText)}&tipe=${currentMode}&lat=${pos.coords.latitude}&long=${pos.coords.longitude}`)
            .then(() => {
                msg.innerText = `Terverifikasi: ${decodedText}`;
                updateLog(decodedText, currentMode);
                setTimeout(() => { box.style.display = "none"; isProcessing = false; }, 3000);
            });
        }, () => {
            alert("Aktifkan GPS!");
            isProcessing = false;
        });
    }

    function updateLog(id, mode) {
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const item = `
            <div class="log-item">
                <div>
                    <div style="font-weight:700; font-size:12px;">${id}</div>
                    <div style="font-size:9px; color:#64748b;">${now}</div>
                </div>
                <div style="font-weight:700; font-size:11px; color: ${mode === 'MASUK' ? '#34d399' : '#f87171'}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = item + document.getElementById('logList').innerHTML;
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);
</script>
</body>
</html>
