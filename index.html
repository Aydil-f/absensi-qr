<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi QR - SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --primary-neon: #3b82f6;
            --secondary-neon: #06b6d4;
            --glass: rgba(15, 23, 42, 0.8);
            --border-glow: rgba(59, 130, 246, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            margin: 0; min-height: 100vh; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Dekorasi Garis Partikel (Web3 Look) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        .header { padding: 50px 20px 30px; text-align: center; }
        .header h1 { 
            font-size: 2.8rem; font-weight: 800; line-height: 1.1; margin: 0;
            background: linear-gradient(to bottom, #ffffff 50%, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header span { color: var(--secondary-neon); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; font-weight: 700; }

        .container { width: 90%; max-width: 450px; }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glow);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(59, 130, 246, 0.05);
        }

        /* Toggle Button Custom */
        .mode-selector {
            display: flex; background: rgba(0,0,0,0.4); border-radius: 16px;
            padding: 6px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: transparent; color: #64748b; font-weight: 700;
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-btn.active-m { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .mode-btn.active-p { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); }

        /* Scanner Styling */
        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(59, 130, 246, 0.2) !important;
        }
        #reader__scan_region { background: #000; }

        /* Status Label Terverifikasi */
        .status-box {
            display: none; margin-top: 25px; padding: 20px; border-radius: 20px;
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);
            animation: fadeIn 0.5s ease;
        }
        .status-content { display: flex; align-items: center; gap: 15px; }
        .circle-check { 
            width: 40px; height: 40px; background: #10b981; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .status-text h4 { margin: 0; color: #34d399; font-size: 14px; }
        .status-text p { margin: 2px 0 0; color: #94a3b8; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Log Section */
        .log-section { margin-top: 40px; width: 100%; padding-bottom: 50px; }
        .log-title { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .log-item {
            background: rgba(255,255,255,0.02); padding: 15px 20px; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }

        #reader__dashboard_section_csr button {
            background: #2563eb !important; border: none !important; border-radius: 10px !important;
            padding: 10px 20px !important; color: white !important; font-weight: 700 !important;
        }
    </style>
</head>
<body>

<div class="header">
    <span>SDN Kampung Besar III</span>
    <h1>Absen Digital <br>Untuk <span style="-webkit-text-fill-color: var(--secondary-neon);">SDN Kampung Besar III</span></h1>
</div>

<div class="container">
    <div class="main-card">
        <div class="mode-selector">
            <button id="mBtn" class="mode-btn" onclick="setMode('MASUK')">MASUK</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('PULANG')">PULANG</button>
        </div>

        <div id="reader"></div>

        <div id="statusBox" class="status-box">
            <div class="status-content">
                <div class="circle-check">✓</div>
                <div class="status-text">
                    <h4>Lokasi Terverifikasi</h4>
                    <p id="statusMsg">Confirmed: User ID Verified</p>
                </div>
            </div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-title">On-Chain Activity (Log Harian)</div>
        <div id="logList"></div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbypNOLWfeCeYlLeKh8a2wbi9Q0G7-vSxcJXO3RP5eTzBBsGr0bXuC380Vnj_oE0bjQ/exec"; // GANTI INI
    let currentMode = "";
    let isProcessing = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mBtn').className = 'mode-btn';
        document.getElementById('pBtn').className = 'mode-btn';
        if(mode === 'MASUK') document.getElementById('mBtn').classList.add('active-m');
        else document.getElementById('pBtn').classList.add('active-p');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing || !currentMode) return;
        
        isProcessing = true;
        const box = document.getElementById('statusBox');
        const msg = document.getElementById('statusMsg');
        
        box.style.display = "block";
        box.style.borderColor = "rgba(59, 130, 246, 0.3)";
        msg.innerText = "Processing Transaction...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const long = pos.coords.longitude;
                
                fetch(`${webAppUrl}?id_user=${encodeURIComponent(decodedText)}&tipe=${currentMode}&lat=${lat}&long=${long}`)
                .then(() => {
                    box.style.background = "rgba(16, 185, 129, 0.05)";
                    box.style.borderColor = "rgba(16, 185, 129, 0.2)";
                    msg.innerText = `Confirmed: ${decodedText} Success.`;
                    updateLog(decodedText, currentMode);
                    setTimeout(() => { box.style.display = "none"; isProcessing = false; }, 4000);
                });
            }, () => {
                alert("GPS Harus Aktif!");
                isProcessing = false;
            });
        }
    }

    function updateLog(id, mode) {
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const item = `
            <div class="log-item">
                <div>
                    <div style="font-weight:800; font-size:14px;">${id}</div>
                    <div style="font-size:10px; color:#64748b;">${now} • Timestamp Confirmed</div>
                </div>
                <div style="font-weight:800; color: ${mode === 'MASUK' ? '#34d399' : '#f87171'}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = item + document.getElementById('logList').innerHTML;
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);
</script>

</body>
</html>
