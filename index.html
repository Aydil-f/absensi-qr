<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi QR - SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --primary-dark: #0f172a;
            --accent-blue: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-body); 
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            margin: 0; min-height: 100vh; color: var(--text-main);
        }

        .header { 
            padding: 40px 20px 80px 20px; 
            text-align: center; color: white;
        }
        .header h2 { margin: 0; font-weight: 700; letter-spacing: -1px; font-size: 1.8rem; }
        .header p { opacity: 0.7; font-size: 0.9rem; margin-top: 5px; }

        .container { 
            padding: 0 20px 40px 20px; 
            max-width: 480px; margin: -50px auto 0 auto; 
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .mode-container {
            display: flex; gap: 12px; margin-bottom: 24px;
            background: rgba(0,0,0,0.05); padding: 6px; border-radius: 16px;
        }

        .mode-btn {
            flex: 1; padding: 14px; border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: 0.3s all;
            background: transparent; color: #64748b; font-size: 13px;
        }

        .mode-btn.active-m { background: white; color: var(--success); box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
        .mode-btn.active-p { background: white; color: var(--danger); box-shadow: 0 4px 12px rgba(239,68,68,0.2); }

        #reader { 
            width: 100%; border-radius: 18px; overflow: hidden; 
            border: none !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .status-toast {
            display: none; padding: 16px; border-radius: 16px; 
            margin-top: 16px; font-weight: 600; font-size: 14px;
            text-align: center; transition: 0.3s;
        }

        .history-section { margin-top: 30px; }
        .history-title { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; display: block; }

        .log-card {
            background: white; padding: 16px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 4px solid var(--accent-blue);
        }
        
        /* Menghilangkan instruksi standar html5-qrcode yang mengganggu */
        #reader__dashboard_section_csr button {
            background: var(--accent-blue) !important;
            color: white !important; border: none !important;
            padding: 10px 20px !important; border-radius: 10px !important;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>SDN KAMPUNG BESAR III</h2>
    <p>Presensi Digital Dengan Kartu QR Code</p>
</div>

<div class="container">
    <div class="glass-card">
        <div class="mode-container">
            <button id="mBtn" class="mode-btn" onclick="setMode('MASUK')">MASUK</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('PULANG')">PULANG</button>
        </div>
        
        <div id="reader"></div>
        <div id="status" class="status-toast"></div>
    </div>

    <div class="history-section">
        <span class="history-title">Aktivitas Terbaru</span>
        <div id="logList"></div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycby0eIvZWQdCTBc7EHMQWJMNeoo6MzNBNGWiN0xnRib0jlzEK0vWhaPQ2yxoZO0JZ0I/exec"; // GANTI DENGAN URL EXEC ANDA
    let currentMode = "";
    let isProcessing = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mBtn').className = 'mode-btn';
        document.getElementById('pBtn').className = 'mode-btn';
        
        if(mode === 'MASUK') document.getElementById('mBtn').classList.add('active-m');
        else document.getElementById('pBtn').classList.add('active-p');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        if (!currentMode) {
            alert("Silakan pilih mode MASUK atau PULANG terlebih dahulu.");
            return;
        }

        isProcessing = true;
        const status = document.getElementById('status');
        status.style.display = "block";
        status.style.background = "#e0f2fe";
        status.style.color = "#0369a1";
        status.innerText = "Mengirim data...";

        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ id_user: decodedText, tipe: currentMode })
        })
        .then(() => {
            status.style.background = currentMode === 'MASUK' ? "#dcfce7" : "#fee2e2";
            status.style.color = currentMode === 'MASUK' ? "#166534" : "#991b1b";
            status.innerText = `Berhasil ${currentMode}: ${decodedText}`;
            
            updateLog(decodedText, currentMode);
            
            setTimeout(() => { 
                status.style.display = "none";
                isProcessing = false; 
            }, 3000);
        })
        .catch(() => {
            status.style.background = "#fef2f2";
            status.innerText = "Koneksi Gagal!";
            isProcessing = false;
        });
    }

    function updateLog(id, mode) {
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const color = mode === 'MASUK' ? '#10b981' : '#ef4444';
        const log = `
            <div class="log-card" style="border-left-color: ${color}">
                <div>
                    <div style="font-weight:700; font-size:15px;">${id}</div>
                    <div style="font-size:12px; color:#94a3b8">${now}</div>
                </div>
                <div style="font-weight:700; color:${color}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = log + document.getElementById('logList').innerHTML;
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 20, 
        qrbox: {width: 250, height: 250},
        aspectRatio: 1.0
    });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
